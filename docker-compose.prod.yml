# Production topology (doc 03/05): caddy (TLS/edge), app, worker, postgres-postgis,
# keycloak, and a daily backup job. Secrets come from an environment file that is
# NEVER committed:  docker compose -f docker-compose.prod.yml --env-file .env.prod up -d
#
# Persistent volumes: db-data, keycloak-data, uploads, backups.

services:
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
    depends_on:
      - app

  app:
    build:
      context: .
      dockerfile: infra/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
      AUTH_SECRET: ${AUTH_SECRET}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_FROM: ${SMTP_FROM}
      STORAGE_DRIVER: local
      STORAGE_LOCAL_DIR: /data/uploads
      APP_BASE_URL: ${APP_BASE_URL}
      TZ: Asia/Bangkok
    volumes:
      - uploads:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: infra/Dockerfile.worker
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_FROM: ${SMTP_FROM}
      STORAGE_DRIVER: local
      STORAGE_LOCAL_DIR: /data/uploads
      TZ: Asia/Bangkok
    volumes:
      - uploads:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    restart: unless-stopped
    command: start --optimized
    environment:
      KC_DB: postgres
      KC_DB_URL: ${KC_DB_URL}
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KC_HOSTNAME: ${KC_HOSTNAME}
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_ENABLED: 'true'
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_ADMIN}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD}
    volumes:
      - keycloak-data:/opt/keycloak/data
    depends_on:
      postgres:
        condition: service_healthy

  # Daily DB + uploads backup to a volume mounted off-box in real deployments
  # (doc 05: RPO<=24h). Runs pg_dump + tar once a day.
  backup:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB}
      PGHOST: postgres
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-30}
    entrypoint: ['/bin/sh', '/backup.sh']
    volumes:
      - ./infra/backup.sh:/backup.sh:ro
      - backups:/backups
      - uploads:/data/uploads:ro
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  db-data:
  keycloak-data:
  uploads:
  backups:
  caddy-data:
  caddy-config:
