# Development backing services (doc 03). Run the Next.js app + worker on the
# host (`pnpm dev` / `pnpm worker:dev`) against these. For the full production
# topology (app, worker, caddy, backup) use docker-compose.prod.yml.
#
#   docker compose up -d
#   pnpm db:setup    # migrate + postgis + seed
#   pnpm dev

services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: sos
      POSTGRES_PASSWORD: sos
      POSTGRES_DB: sos
    ports:
      - '5432:5432'
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U sos -d sos']
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: 'true'
    ports:
      - '8080:8080'
    volumes:
      - keycloak-data:/opt/keycloak/data
      - ./infra/keycloak:/opt/keycloak/data/import:ro
    depends_on:
      postgres:
        condition: service_healthy

  # Dev SMTP sink — view mail at http://localhost:8025 (no paid provider).
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - '1025:1025'
      - '8025:8025'

volumes:
  db-data:
  keycloak-data:
